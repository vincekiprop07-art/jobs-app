name: Build debug APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "No gradlew found - generating Gradle wrapper"
            curl -s https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -o gradlew
            curl -s https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew.bat -o gradlew.bat
            mkdir -p gradle/wrapper
            curl -s https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.properties -o gradle/wrapper/gradle-wrapper.properties
          fi
          chmod +x ./gradlew || true

      - name: Set up Gradle wrapper (fallback if missing)
        run: |
          if [ ! -f "./gradlew" ] || [ ! -f "./gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Bootstrapping Gradle wrapper with a system Gradle install"
            sudo apt-get update -y && sudo apt-get install -y unzip
            curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o gradle.zip
            unzip -q gradle.zip
            ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5
            chmod +x ./gradlew
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
